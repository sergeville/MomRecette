name: MomRecette
options:
  bundleIdPrefix: com.villeneuves
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  developmentLanguage: fr

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.villeneuves.MomRecette
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    SUPPORTS_MACCATALYST: YES
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad (Mac Catalyst handles Mac)
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Choisir une photo pour la recette"
    INFOPLIST_KEY_NSCameraUsageDescription: "Prendre une photo du plat"

targets:
  MomRecette:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.villeneuves.MomRecette
        SWIFT_VERSION: "5.9"
        SUPPORTS_MACCATALYST: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Choisir une photo pour la recette"
        INFOPLIST_KEY_NSCameraUsageDescription: "Prendre une photo du plat"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES

    sources:
      - path: .
        excludes:
          - "**/*.md"
          - "*.json"
          - "*.py"
          - "*.yml"
          - "MomRecette.xcodeproj/**"
          - "MomRecetteTests/**"

    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: MomRecette
        CFBundleName: MomRecette
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        NSPhotoLibraryUsageDescription: "Choisir une photo pour la recette"
        NSCameraUsageDescription: "Prendre une photo du plat"

    scheme:
      testTargets:
        - MomRecetteTests

  MomRecetteTests:
    type: bundle.unit-test
    platform: iOS
    sources: MomRecetteTests
    dependencies:
      - target: MomRecette
